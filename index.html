<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get to know me</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <script defer src="script.js"></script>
</head>
<body>
    <div class="container-fluid d-flex  justify-content-center align-items-center">
        
        <form novalidate class="glass p-5 d-flex flex-column justify-content-start align-items-left p-3 " id="form">
            <h1 class="fw-bold ">Know me better</h1>
            <div class="mb-3">
                <label for="name">Name</label>
                <input type="text" name="name" id="name">
                <span class="error"></span>
            </div>

            <div class="mb-3">
                <label for="surname">Surname</label>
                <input type="text" name="surname" id="surname">
                <span class="error"></span>
            </div>

            <div class="mb-3">
                <label for="email">Email</label>
                <input type="email" name="email" id="email">
                <span class="error"></span>
            </div>

            <div class="mb-3">
                <label for="profile">Tech</label>
                <select name="profile" id="profile">
                    <option value="">What is your profile ?</option>
                    <option value="frontend">Front-End</option>
                    <option value="backend">Back-End</option>
                    <option value="design">Design/UX</option>
                    <option value="data">Data</option>
                </select>
                <span class="error"></span>
            </div>
            
            <div class="mb-3">
                <span class="error"></span>
                <input type="radio" name="typePerson" id="typePerson" value="Early Bird">
                <label for="typePerson">Early Bird</label>
                
                <input type="radio" name="typePerson" id="typePerson2" value="Night Owl">
                <label for="typePerson2">Night Owl</label>
            </div>

            <div class="mb-3">
                <input type="checkbox" name="hobby" id="hobby" value="Tech Survey">
                <label for="hobby">Tech Survey</label>
                
                <input type="checkbox" name="hobby" id="gaming" value="Gaming">
                <label for="gaming">Gaming</label>
                
                <input type="checkbox" name="hobby" id="sport" value="Sport">
                <label for="sport">Sport</label>
                
                <input type="checkbox" name="hobby" id="music" value="Music">
                <label for="music">Music</label>
                
                <input type="checkbox" name="hobby" id="reading" value="Reading">
                <label for="reading">Reading</label>
                <span class="error"></span>
            </div>

            <div class="mb-3">
                <label for="storytime">Storytime</label>
                <textarea name="storytime" id="storytime" cols="30"></textarea>
                <span class="remaining">255 characters</span>
                <span class="error"></span>
            </div>

            <div class="mb-3">
                <button type="submit" class="btn btn-primary" id="btn">Send</button>
            </div>
        </form>

        <div class="m-4 card" id="card" style="display: none !important; border-radius: 20px;"></div>
        
    </div>
</body>
</html>
