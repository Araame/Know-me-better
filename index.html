<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get to know me</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
    <script defer src="script.js"></script>
</head>
<body>
    <div class="container-fluid d-flex flex-column justify-content-center align-items-center text-dark">
        <h1 class="fw-bold text-secondary">Know me better</h1>
        <form novalidate>
            <div class="mb-3">
                <label public for="name">Name</label>
                <input type="text" name="name" id="name">
                <span class="error"></span>
            </div>

            <div class="mb-3">
                <label for="surname">Surname</label>
                <input type="text" name="surname" id="surname">
                <span class="error"></span>

            </div>

            <div class="mb-3">
                <label for="email">Email</label>
                <input type="email" name="email" id="email">
                <span class="error"></span>

            </div>

            <div class="mb-3">
                <label for="profile">Tech</label>
                <select name="profile" id="profile">
                    <option value="">What is your profile ?</option>
                    <option value="frontend">Front-End</option>
                    <option value="backend">Back-End</option>
                    <option value="design">Design/UX</option>
                    <option value="data">Data</option>
                </select>
                <span class="error"></span>
            </div>
            
            <div class="mb-3">
                <span class="error"></span>
                <input type="radio" name="typePerson" id="typePerson" value="Early Bird">
                <label for="earlyBird">Early Bird</label>
                
                <input type="radio" name="typePerson" id="typePerson" value="Night Owl">
                <label for="nightOwl">Night Owl</label>
            </div>

            <div class="mb-3">
                <input type="checkbox" name="hobby" id="hobby" value="Tech Survey">
                <label for="tech_survey">Tech Survey</label>
                
                <input type="checkbox" name="hobby" id="gaming" value="Gaming">
                <label for="gaming">Gaming</label>
                
                <input type="checkbox" name="hobby" id="sport" value="Sport">
                <label for="sport">Sport</label>
                
                <input type="checkbox" name="hobby" id="music" value="Music">
                <label for="music">Music</label>
                
                <input type="checkbox" name="hobby" id="reading" value="Reading">
                <label for="reading">Reading</label>
                <span class="error"></span>
            </div>

            <div class="mb-3">
                <label for="storytime">Storytime</label>
                <textarea name="storytime" id="storytime" cols="30"></textarea>
            </div>

            <div class="mb-3">
                <button type="submit" class="btn btn-primary">Send</button>
            </div>
        </form>
    </div>
    
</body>
</html>
