<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get to know me</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
    <script defer src="script.js"></script>
</head>
<body>
    <div class="container-fluid d-flex flex-column justify-content-center align-items-center text-dark">
        <h1 class="fw-bold text-secondary">Know me better</h1>
        <form novalidate>
            <div class="mb-3">
                <label for="name">Name</label>
                <input type="text" name="name" id="name">
                <label for="surname">Surname</label>
                <input type="text" name="surname" id="surname">
            </div>

            <div class="mb-3">
                <label for="email">Email</label>
                <input type="email" name="email" id="email">
            </div>

            <div class="mb-3">
                <label for="profile">Tech</label>
                <select name="profile" id="profile">
                    <option value="frontend">Front-End</option>
                    <option value="backend">Back-End</option>
                    <option value="design">Design/UX</option>
                    <option value="data">Data</option>
                </select>
            </div>
            
            <div class="mb-3">
                <label for="name">Early Bird</label>
                <input type="radio" name="typePerson" id="earlyBird">
                <label for="name">Night Owl</label>
                <input type="radio" name="typePerson" id="nightOwl">
            </div>

            <div class="mb-3">
                <label for="hobby">Tech Survey</label>
                <input type="checkbox" name="hobby" id="tech_survey">
                <label for="hobby">Gaming</label>
                <input type="checkbox" name="hobby" id="gaming">
                <label for="hobby">Sport</label>
                <input type="checkbox" name="hobby" id="sport">
                <label for="hobby">Music</label>
                <input type="checkbox" name="hobby" id="music">
                <label for="hobby">Reading</label>
                <input type="checkbox" name="hobby" id="reading">
            </div>

            <div class="mb-3">
                <label for="storytime">Storytime</label>
                <textarea name="storytime" id="storytime" cols="30"></textarea>
            </div>

            <div class="mb-3">
                <button type="submit">Send</button>
            </div>
        
        </form>
    </div>
    
</body>
</html>
